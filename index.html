<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise 🎉</title>

<style>
body {
    margin:0;
    text-align:center;
    font-family: Arial;
    background:black;
    color:white;
}

#startScreen {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

button {
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:10px;
    background:#ff4081;
    color:white;
    cursor:pointer;
}

#wishScreen {
    display:none;
    padding-top:100px;
}

h1 {
    font-size:40px;
    color:#ff4081;
}

</style>
</head>

<body>

<!-- First Screen -->
<div id="startScreen">
    <h1>🎁 Tap for Surprise 🎁</h1>
    <button onclick="showWish()">Open</button>
</div>

<!-- Second Screen -->
<div id="wishScreen">
    <h1>🎉 Happy Birthday 🎉</h1>
    <p style="font-size:25px;">
        Wishing you lots of happiness, success and joy in your life ❤️
         background: linear-gradient( orange,white , green);
    </p>
    
</div>

<!-- Music -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3"></audio>

<script>
function showWish(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("wishScreen").style.display="block";
    document.getElementById("music").play();
}
</script>

</body>
</html>
