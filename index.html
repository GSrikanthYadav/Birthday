<!DOCTYPE html>
<html>
<head>
<title>Special Day</title>

<style>
body {
    margin:0;
    text-align:center;
    font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    background: black;
    color:white;
}

#startScreen {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

button {
    padding:20px 35px;
    font-size:25px;
    border:none;
    border-radius:16px;
    background:white;
    color:black;
    cursor:pointer;
}

#wishScreen {
    display:none;
    padding-top:100px;
}

h1 {
    font-size:50px;
    color:#ff4081;
}

div{
    animation-name: abc;
    animation-duration: 1s;
    animation-timing-function: ease;
    animation-delay: 0s;
    animation-iteration-count: infinite;
    /* animation-direction: normal; */
    /* animation-direction: reverse; */
    /* animation-direction:alternate; */
    animation-direction: alternate-reverse;

    
}
@keyframes abc {
    from{
font-size: 50px;
color:white;
    }to{
font-size: 100px;
color: black
    }
}

</style>
</head>

<body>

<!-- First Screen -->
<div id="startScreen">
    <h1>🎁</h1>
    <button onclick="showWish()">open</button>
</div>

<!-- Second Screen -->
<div id="wishScreen">
    <h1 fontstyle="" >Happy Birthday Keeru❤️🫂</h1>
    <p style="font-size:25px;">
        Wishing you lots of happiness, success and joy in your life
    </p>
    
</div>

<!-- Music -->
<audio id="music" src="https://www.bensound.com/bensound-music/bensound-happyrock.mp3"></audio>

<script>
function showWish(){
    document.getElementById("startScreen").style.display="none";
    document.getElementById("wishScreen").style.display="block";
    document.getElementById("music").play();
}
</script>

</body>
</html>
